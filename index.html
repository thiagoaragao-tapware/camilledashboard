<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Parisi — Tapware Finder</title>
<meta name="theme-color" content="#0a0a0b">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ HOME VIEW ============ -->
<section id="view-home" class="view view-home active">
  <div class="home-wrap">
    <header class="brand">
      <h1 class="brand-mark">PARISI</h1>
      <p class="brand-sub">Tapware Finder</p>
    </header>

    <form id="search-form" class="search-bar" autocomplete="off">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M10.5 3a7.5 7.5 0 1 0 4.62 13.42l5.13 5.13 1.06-1.06-5.13-5.13A7.5 7.5 0 0 0 10.5 3zm0 1.5a6 6 0 1 1 0 12 6 6 0 0 1 0-12z" fill="currentColor"/></svg>
      </span>
      <input id="search-input" type="text" inputmode="search" placeholder="Code, name, location or shelf" aria-label="Search products" />
      <button type="button" id="ocr-btn" class="icon-btn" aria-label="Scan product code with camera" title="Scan code">
        <svg viewBox="0 0 24 24" width="19" height="19"><path d="M9 3l-1.5 2H4a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1h-3.5L15 3H9zm3 5.5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4z" fill="currentColor"/></svg>
      </button>
      <button type="submit" id="search-submit" class="icon-btn arrow-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 12h14.17l-5.58-5.59L14 5l8 7-8 7-1.41-1.41L18.17 13H4z" fill="currentColor"/></svg>
      </button>
    </form>

    <div id="suggestions" class="suggestions" role="listbox" hidden></div>

    <nav class="home-nav">
      <button id="go-backstock" class="ghost-link">Back to Stock</button>
    </nav>
  </div>

  <footer class="site-footer">
    Found an error or missing info? Please let Thiago know.
  </footer>
</section>

<!-- ============ RESULTS VIEW ============ -->
<section id="view-results" class="view view-results">
  <header class="top-bar">
    <button id="back-from-results" class="icon-btn back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" width="19" height="19"><path d="M15.5 4.5L7 13l8.5 8.5 1.4-1.4L9.8 13l7.1-7.1z" fill="currentColor"/></svg>
    </button>
    <span class="top-bar-mark">PARISI</span>
    <span class="top-bar-spacer" aria-hidden="true"></span>
  </header>

  <form id="search-form-compact" class="search-bar search-bar--compact" autocomplete="off">
    <span class="search-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M10.5 3a7.5 7.5 0 1 0 4.62 13.42l5.13 5.13 1.06-1.06-5.13-5.13A7.5 7.5 0 0 0 10.5 3zm0 1.5a6 6 0 1 1 0 12 6 6 0 0 1 0-12z" fill="currentColor"/></svg>
    </span>
    <input id="search-input-compact" type="text" inputmode="search" placeholder="Code, name, location or shelf" aria-label="Search products" />
    <button type="button" id="ocr-btn-compact" class="icon-btn" aria-label="Scan product code with camera" title="Scan code">
      <svg viewBox="0 0 24 24" width="17" height="17"><path d="M9 3l-1.5 2H4a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1h-3.5L15 3H9zm3 5.5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4z" fill="currentColor"/></svg>
    </button>
    <button type="submit" class="icon-btn arrow-btn" aria-label="Search">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 12h14.17l-5.58-5.59L14 5l8 7-8 7-1.41-1.41L18.17 13H4z" fill="currentColor"/></svg>
    </button>
  </form>

  <div id="suggestions-compact" class="suggestions" role="listbox" hidden></div>

  <div id="results-count" class="results-count"></div>
  <div id="results-body" class="results-body"></div>
</section>

<!-- ============ BACK TO STOCK VIEW ============ -->
<section id="view-backstock" class="view view-backstock">
  <header class="top-bar">
    <button id="back-from-backstock" class="icon-btn back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" width="19" height="19"><path d="M15.5 4.5L7 13l8.5 8.5 1.4-1.4L9.8 13l7.1-7.1z" fill="currentColor"/></svg>
    </button>
    <span class="top-bar-mark">Back to Stock</span>
    <button id="clear-backstock" class="text-btn" aria-label="Clear all">Clear</button>
  </header>
  <div id="backstock-body" class="backstock-body"></div>
</section>

<!-- ============ OCR MODAL ============ -->
<div id="ocr-modal" class="ocr-modal" hidden>
  <div class="ocr-panel">
    <button id="ocr-close" class="icon-btn back-btn" aria-label="Close scanner">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6.4 4.98L4.98 6.4 10.59 12l-5.61 5.6 1.41 1.42L12 13.4l5.6 5.61 1.42-1.41L13.4 12l5.61-5.6-1.41-1.42L12 10.59z" fill="currentColor"/></svg>
    </button>
    <p class="ocr-title">Scan Product Code</p>
    <div class="ocr-frame">
      <input type="file" id="ocr-input" accept="image/*" capture="environment" hidden />
      <div id="ocr-placeholder" class="ocr-placeholder">
        <svg viewBox="0 0 24 24" width="34" height="34"><path d="M9 3l-1.5 2H4a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1h-3.5L15 3H9zm3 5.5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4z" fill="currentColor"/></svg>
        <span>Tap to open camera</span>
      </div>
      <img id="ocr-preview" alt="Captured code" hidden />
      <div class="ocr-corner tl"></div><div class="ocr-corner tr"></div>
      <div class="ocr-corner bl"></div><div class="ocr-corner br"></div>
    </div>
    <button id="ocr-capture-btn" class="primary-btn">Open Camera</button>
    <p id="ocr-status" class="ocr-status"></p>
  </div>
</div>

<!-- toast -->
<div id="toast" class="toast" hidden></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
